version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: momentpages-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-momentpages}
      POSTGRES_USER: ${POSTGRES_USER:-momentpages}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-momentpages_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-momentpages}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: momentpages-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-momentpages}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-momentpages}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-momentpages_dev}
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: momentpages-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080/api/v1
    ports:
      - "3000:3000"

volumes:
  postgres_data:
