# This file should NOT contain real secrets.
# For local dev with real credentials, use application-local.yml (gitignored).

app:
  frontend-url: http://localhost:3000
  backend-url: http://localhost:8080
  cors:
    allowed-origins: "http://localhost:3000"

stripe:
  secret-key: ""
  webhook-secret: ""
