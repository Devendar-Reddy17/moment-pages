spring:
  application:
    name: momentpages-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/momentpages}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      max-lifetime: 300000
      idle-timeout: 180000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: ${BACKEND_PORT:8080}

# Application Config
app:
  domain: ${APP_DOMAIN:momentpages.com}
  frontend-url: ${NEXT_PUBLIC_APP_URL:http://localhost:3000}
  backend-url: ${BACKEND_URL:http://localhost:8080}
  management-token-length: ${MANAGEMENT_TOKEN_LENGTH:64}
  cors:
    allowed-origins: "${NEXT_PUBLIC_APP_URL:http://localhost:3000},https://momentpages.com,https://*.momentpages.com"

# Stripe
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_xxx}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_xxx}
  prices:
    base-publish: price_base_publish
    addon-video: price_addon_video
    addon-ai-images: price_addon_ai_images
    addon-reminders: price_addon_reminders
    addon-premium-theme: price_addon_premium_theme
    addon-custom-domain: price_addon_custom_domain
    reactivation: price_reactivation

# Cloudflare R2
r2:
  account-id: ${R2_ACCOUNT_ID:}
  access-key-id: ${R2_ACCESS_KEY_ID:}
  secret-access-key: ${R2_SECRET_ACCESS_KEY:}
  bucket-name: ${R2_BUCKET_NAME:momentpages-media}
  public-url: ${R2_PUBLIC_URL:}
  upload-expiry-minutes: ${R2_UPLOAD_EXPIRY_MINUTES:15}

# OpenAI
openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  max-tokens: ${OPENAI_MAX_TOKENS:1000}

# Logging
logging:
  level:
    com.momentpages: DEBUG
    org.springframework.web: INFO
