spring:
  application:
    name: momentpages-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://ep-wandering-art-abk8ff5c.eu-west-2.aws.neon.tech/neondb?sslmode=require
    username: neondb_owner
    password: npg_WUDH3BbgRkz6
    hikari:
      maximum-pool-size: 20
      max-lifetime: 300000
      idle-timeout: 180000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: ${BACKEND_PORT:8089}

# Application Config
app:
  domain: ${APP_DOMAIN:momentpages.com}
  frontend-url: ${NEXT_PUBLIC_APP_URL:http://localhost:3000}
  backend-url: ${BACKEND_URL:http://localhost:8089}
  management-token-length: ${MANAGEMENT_TOKEN_LENGTH:64}
  cors:
    allowed-origins: "${NEXT_PUBLIC_APP_URL:http://localhost:3000},https://momentpages.com,https://*.momentpages.com"

